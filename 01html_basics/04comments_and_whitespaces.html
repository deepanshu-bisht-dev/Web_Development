<!-- Comments are notes in your HTML code that are ignored by the browser.
They are useful for explaining code or leaving reminders. -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Comments</h1>
    <p><!-- This is a comment -->
    <p>This is visible content.</p>
    <!-- <p>This line will not show on the webpage.</p> --></p>
    <!-- Comments do not appear on the webpage. They're only visible in the source code. -->
    <h1>Whitespaces</h1>
    <!-- Whitespace includes spaces, tabs, and newlines (Enter key). HTML treats multiple spaces as a single space. -->
    <p>This is spaced.</p>
    <!-- But it will be displayed as This is spaced. -->
    <!-- For something to be displayed as it is, we can put it inside pre tag like this  -->
    <pre>
    <p>This    is     preformatted
   text.</p>
</pre>
</body>

</html>

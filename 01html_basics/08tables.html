<!-- Use the <table> tag to create tables. Inside a table, use:

. <tr> for table rows
. <td> for table data (cells)
. <th> for table headers    m                                     -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <h1>Tables</h1>
    <table border="1">
        <tr>
            <th>S.no.</th>
            <th>Items</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Apples</td>
            <td>$1.99</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Oranges</td>
            <td>$2.99</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Grapes</td>
            <td>$3.99</td>
        </tr>
        <tr>
            <td>4</td>
            <td>Pineapples</td>
            <td>$4.99</td>
        </tr>
        <tr>
            <td>5</td>
            <td>Pears</td>
            <td>$5.99</td>
        </tr>
    </table>
</body>
</html>

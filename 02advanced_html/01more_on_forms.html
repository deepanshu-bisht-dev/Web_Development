<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>

<body>
    <h1>Forms</h1>
    <form action="/source.php"></form>
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Enter your name">
    <br><br>
    <label for="phone">Contact no.</label>
    <input type="tel" id="phone" name="phone" placeholder="Enter your contact no.">
    <br><br>
    <label for="pass">Password</label>
    <input type="password" id="pass" name="password" placeholder="Enter password">
    <br><br>
    <label for="cpass">Confirm password</label>
    <input type="password" id="cpass" name="confirm password" placeholder="Confirm password">
    <br><br>
    <!-- Use radio buttons when users need to select only one option from a group. -->
     <p>Choose your gender</p>
    <input type="submit" value="Submit">
</body>

</html>

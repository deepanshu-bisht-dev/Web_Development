<!-- Meta tags provide information about the webpage to browsers and search engines.
They go inside the <head> section and do not appear on the page itself. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- 1. Charset - Defines the character encoding. UTF-8 covers most characters in all languages.-->
     <meta charset="UTF-8">
    <!-- 2. Viewport (Mobile Responsivness) - Makes your website mobile-friendly.Tells the browser to match the screen's width.-->
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 3.Page Description - Summarizes the page content.Often shown in search engine results. -->
     <meta name="description" content="Learn HTML from scratch with simple examples.">
    <!-- 4. Keywords - List of keywords related to your page. Not heavily used by modern search engines. -->
     <meta name="keywords" content="HTML, web development, coding">
    <!-- 5. Author - Specifies the name of the content creator. -->
     <meta name="Author" content="Deepanshu Bisht">
    <!-- 6. Refresh / Redirect (Optional) - Redirects the page after 5 seconds. -->
     <meta http-equiv="refresh" content="5; url=https://youtube.com">
    <title>Meta Tags</title>

</head>
<body>
    <h1>Redirecting in 5 seconds....</h1>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
</head>
<body>
    <h1>Internal Links</h1>
    <p>Internal links connect one page of your website to another. They help users navigate within your site.</p>
    <!-- <a href="about.html">About Us</a> This opens the about.html page located in the same folder. -->
     <p>Linking to a Section on the Same Page - Use #id to jump to a specific section.</p>
    <!-- <a href="#contact">Go to Contact Section</a>

            ...

        <h2 id="contact">Contact Us</h2> -->
    <h1>External Links</h1>
    <p>External links take the user to a different website.</p>
    <!-- <a href="https://www.google.com">Visit Google</a>. By using the target="_blank" attribute we can openexternal links in new tab. -->
     <!-- Adding rel="noopener noreferrer" for Security
    When using target="_blank", it's recommended to add rel="noopener noreferrer" to prevent security risks. -->
    <a href="https://external.com" target="_blank" rel="noopener noreferrer">
      Visit External Site</a>
</body>
</html>
